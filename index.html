<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Rameaux</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #f5f5f5;
  font-family: "Georgia", serif;
  text-align: center;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.container {
  padding: 40px 20px;
}

.logo {
  width: 260px;
  margin-bottom: 20px;
}

.line {
  width: 80%;
  height: 2px;
  margin: 20px auto;
  background: linear-gradient(to right, #002395, white, #ED2939);
}

.subtitle {
  letter-spacing: 4px;
  font-size: 12px;
  color: #aaa;
}

.text {
  max-width: 600px;
  margin: 40px auto;
  font-size: 16px;
  color: #ccc;
  font-style: italic;
}

.catalogue-box {
  border: 1px solid #444;
  padding: 30px 20px;
  max-width: 600px;
  margin: 40px auto;
}

.btn {
  display: inline-block;
  padding: 15px 30px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  letter-spacing: 2px;
  margin-top: 15px;
}

.btn:hover {
  background: #fff;
  color: #000;
}

.actions {
  margin-top: 40px;
}

.whatsapp {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  border: 1px solid #25D366;
  color: #25D366;
  text-decoration: none;
  font-size: 14px;
}

.maps {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
}

footer {
  margin-top: 50px;
  color: #666;
  font-size: 12px;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="line"></div>

<div class="subtitle">
ÉPICERIE FINE • TRAITEUR • CHARCUTERIE ARTISANALE HALAL
</div>

<div class="text">
Chez Maison Rameaux, chaque produit est sélectionné avec soin.
Une épicerie fine où l’artisanat et la qualité se rencontrent.
</div>

<div class="catalogue-box">
  <h2>Catalogue Maison Rameaux</h2>

  <a href="catalogue.pdf" class="btn" target="_blank">
    OUVRIR LE CATALOGUE
  </a>
</div>

<div class="actions">
  <a href="https://wa.me/212XXXXXXXXX" class="whatsapp">
    WhatsApp
  </a>

  <a href="https://maps.google.com/?q=TON+ADRESSE" class="maps">
    Itinéraire
  </a>
</div>

<footer>
© Maison Rameaux
</footer>

</div>

</body>
</html>
