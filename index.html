<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Maison Rameaux</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #f5f5f5;
      text-align: center;
    }

    header {
      padding: 40px 20px 20px;
    }

    img.logo {
      width: 200px;
      max-width: 80%;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    p {
      color: #ccc;
      max-width: 500px;
      margin: 20px auto;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px 25px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .catalogue {
      background-color: #f5f5f5;
      color: #000;
    }

    .whatsapp {
      background-color: #25D366;
      color: white;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="Maison Rameaux" class="logo">
  <h1>Maison Rameaux</h1>
  <p>Charcutier & Traiteur – Produits artisanaux de qualité</p>
</header>

<div class="buttons">

  <a href="catalogue.pdf" class="btn catalogue" target="_blank">
    📖 Voir le catalogue
  </a>

  <a href="https://wa.me/212XXXXXXXXX" class="btn whatsapp">
    📲 Commander sur WhatsApp
  </a>

</div>

<footer>
  © Maison Rameaux
</footer>

</body>
</html>
